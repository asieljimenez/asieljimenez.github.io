<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #id-contenedor{
            width: calc(100% - 100px);
            height: 100vh;
            padding: 50px;
            background-color: antiquewhite;
            position: relative;
        }
        .imagen-foco{
            position: absolute;
            animation: acercamiento 2s infinite linear;
        }

        @keyframes acercamiento {
            0%{
                transform: scale(0);
                opacity: 0;
            }
            75%{
                opacity: 1;
            }
            100%{
                transform: scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="id-contenedor"></div>
    <script>
        const contenedor = document.getElementById("id-contenedor");

        for(let i = 0; i < 5; i++){
            const imagen = document.createElement("img");
            const ancho = Math.round(Math.random() * 100);
            const y = Math.round(Math.random() * 1000);
            const x = Math.round(Math.random() * 1000);

            imagen.src = "https://cdn.pixabay.com/photo/2017/04/20/01/46/focus-2244304_960_720.png";
            imagen.classList.add("imagen-foco");
            imagen.style.width = ancho + "px";

            imagen.style.top = y + "px";
            imagen.style.left = x + "px";

            contenedor.appendChild(imagen);
        }
    </script>
</body>
</html>
